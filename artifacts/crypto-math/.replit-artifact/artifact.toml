kind = "web"
previewPath = "/"
title = "Cryptography Using Mathematics"
version = "1.0.0"
id = "artifacts/crypto-math"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22284

[services.development]
run = "pnpm --filter @workspace/crypto-math run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-math", "run", "build" ]
publicDir = "artifacts/crypto-math/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22284"
BASE_PATH = "/"
